spring:
  application:
    name: gateway-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/blog_saas_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

server:
  port: 8080

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000 # 24 hours
    internal-secret: ${INTERNAL_SECRET}
    master:
      email: ${MASTER_ADMIN_EMAIL:master@admin.com}
      password: ${MASTER_ADMIN_PASSWORD}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}

resend:
  api:
    key: ${RESEND_API_KEY:}
  from:
    email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}

ai-service:
  base-url: ${AI_SERVICE_URL:http://127.0.0.1:8000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [GATEWAY-SERVICE] [%F:%M] - %msg%n"
