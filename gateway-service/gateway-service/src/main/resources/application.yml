spring:
  application:
    name: gateway-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/blog_saas_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    show-sql: false

  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

app:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: 86400000 # 24 hours
    internal-secret: ${INTERNAL_SECRET}
    master:
      email: ${MASTER_ADMIN_EMAIL:master@admin.com}
      password: ${MASTER_ADMIN_PASSWORD}
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  email:
    from: ${EMAIL_FROM_ADDRESS:noreply@blogwho.com}

ai-service:
  base-url: ${AI_SERVICE_URL:http://127.0.0.1:8000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [GATEWAY-SERVICE] [%F:%M] - %msg%n"
